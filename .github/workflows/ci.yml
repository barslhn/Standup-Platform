name: CI

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  ci:
    name: Install -> Lint -> Typecheck -> Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Cache node_modules and pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            backend/node_modules
            frontend/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('backend/pnpm-lock.yaml', 'frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install backend deps
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Lint backend (fail on error)
        working-directory: backend
        run: pnpm exec eslint "{src,apps,libs,test}/**/*.ts"

      - name: Type check backend
        working-directory: backend
        run: pnpm exec tsc --noEmit -p tsconfig.build.json

      - name: Build backend
        working-directory: backend
        run: pnpm build

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend (fail on error)
        working-directory: frontend
        run: pnpm lint

      - name: Type check frontend
        working-directory: frontend
        run: pnpm exec tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
