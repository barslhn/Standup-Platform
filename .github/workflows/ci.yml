name: CI

on:
  push:

permissions:
  contents: read

jobs:
  ci:
    name: Install -> Lint -> Typecheck -> Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Cache node_modules and pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            backend/node_modules
            frontend/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('backend/pnpm-lock.yaml', 'frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install backend deps
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        working-directory: backend
        run: pnpm exec eslint "{src,apps,libs,test}/**/*.ts"

      - name: Type check backend
        working-directory: backend
        run: pnpm exec tsc --noEmit -p tsconfig.build.json

      - name: Build backend
        working-directory: backend
        run: pnpm build

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: pnpm lint

      - name: Type check frontend
        working-directory: frontend
        run: pnpm exec tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_WS_URL: http://localhost:3001
        run: pnpm build

  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2

  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    needs: [ci, gitleaks]
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-main
      cancel-in-progress: true
    steps:
      - name: Check deploy secrets
        id: guard
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        run: |
          if [ -z "$VM_HOST" ] || [ -z "$VM_USER" ] || [ -z "$VM_SSH_KEY" ]; then
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Deploy skipped: VM_HOST / VM_USER / VM_SSH_KEY secrets are missing."
          else
            echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: steps.guard.outputs.deploy_enabled == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          script: |
            cd ~/Standup-Platform
            export COMPOSE_PARALLEL_LIMIT=1
            git pull --ff-only origin main
            docker compose build backend
            docker compose up -d backend
            docker compose build frontend
            docker compose up -d frontend
            docker compose ps
